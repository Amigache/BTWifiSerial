; PlatformIO Project Configuration File
; BTWifiSerial - BLE to Serial bridge for EdgeTX radios
; Target: ESP32-C3 SuperMini

[env:esp32c3_supermini]
platform = espressif32
board = esp32-c3-devkitm-1
framework = arduino

; --- Build flags ---
build_flags =
    -D ARDUINO_USB_MODE=1
    -D ARDUINO_USB_CDC_ON_BOOT=1
    -D CONFIG_BT_NIMBLE_MAX_CONNECTIONS=1
    -D DEBUG_MODE=1
    -D LOG_LEVEL=4
    ; SBUS_HW_INVERT=0 disables ESP32 TX inversion (TX16S AUX port has hardware inverter)
    -D SBUS_HW_INVERT=0

; --- Upload ---
upload_protocol = esptool
upload_speed = 921600
monitor_speed = 115200
monitor_dtr = 0
monitor_rts = 0

; --- Partitions (OTA support) ---
board_build.partitions = min_spiffs.csv

; --- Extra scripts ---
extra_scripts = pre:scripts/gen_build_ts.py

; --- Libraries ---
lib_deps =
    h2zero/NimBLE-Arduino@^1.4.3
    mathieucarbou/ESPAsyncWebServer@^3.6.0
    bblanchon/ArduinoJson@^7.3.0
